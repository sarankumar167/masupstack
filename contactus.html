<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <h1>Contact Us</h1>
    <p>If you have any questions or feedback, please feel free to reach out to us using the form below:</p>
    <form action="#" method="post">
<fieldset>
    <legend>Contact Form</legend><br><br>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required placeholder="Enter your name" maxlength="15" pattern="^[a-zA-Z\s]+$"><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required placeholder="Enter your email"><br><br>
        <label for="phone">Enter You'r Phone Number</label><br>
        <input type="tel" id="phone" name="phone" required placeholder=" Phone number" maxlength="10" size="10"pattern="^\d{10}$"><br><br>
        <label for="subject">Subject:</label><br>
        <input type="text" id="subject" name="subject" required placeholder="Enter the subject"><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="40" required placeholder="Enter your message" maxlength="500"></textarea><br><br>
        <input type="submit" value="Submit"><br><br>
        <input type="checkbox" required> I agree to the terms and conditions.<br><br>
        <p>&copy; 2026 Your Company. All rights reserved.</p>
        </fieldset>
    </form>
</body>
</html>
